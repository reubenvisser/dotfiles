# Clamshell / closed-display mode
# Disable the laptop output when the lid closes; re-enable when it opens.
# The exec_always line reapplies the current lid state after `swaymsg reload`,
# otherwise sway re-enables every output on reload.

set $laptop eDP-1
bindswitch --reload --locked lid:on  output $laptop disable
bindswitch --reload --locked lid:off output $laptop enable

exec_always ~/.config/sway/clamshell.sh
