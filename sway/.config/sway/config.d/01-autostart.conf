# Autostart applications

# Wallpaper
output * bg ~/.config/sway/wallpaper.png fill

# Publish sway's env to dbus + systemd user session so xdg-desktop-portal and
# other user services can find WAYLAND_DISPLAY. Must run before anything that
# talks to the portal (dex, nm-applet, GTK/Electron apps).
# exec_always so reloads re-sync the env; missing any of these makes
# xdg-desktop-portal-gtk fail with "cannot open display:" and GTK apps hang 20s.
exec_always systemctl --user import-environment WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE SWAYSOCK
exec_always dbus-update-activation-environment --systemd WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE SWAYSOCK

# XDG autostart
exec dex --autostart --environment sway

# Idle + lock on suspend
exec swayidle -w \
    timeout 600 '~/.config/sway/lock.sh' \
    before-sleep '~/.config/sway/lock.sh'

# Network manager applet (needs a tray — waybar provides one if you switch bars)
exec nm-applet --indicator

# Wacom tablet setup — maps stylus to the monitor from ~/.config/wacom/wacom.conf
exec ~/.local/bin/wacom-setup.sh init
