# Vim-grammar modal system
# Enter main mode with $mod+m, then use mnemonic key sequences

# ── Main mode ($mod+m) ─────────────────────────────────────────
mode "main" {
    bindsym b exec ~/.local/bin/wofi-bluetooth; mode "default"
    bindsym p mode "power"
    bindsym i mode "insert"
    bindsym s mode "session"

    bindsym Escape mode "default"
    bindsym $mod+m mode "default"
}
bindsym $mod+m mode "main"

# ── Power mode (main → p) ──────────────────────────────────────
mode "power" {
    bindsym s exec systemctl suspend; mode "default"
    bindsym p exec systemctl poweroff; mode "default"
    bindsym r exec systemctl reboot; mode "default"
    bindsym l exec ~/.config/sway/lock.sh; mode "default"

    bindsym Escape mode "default"
    bindsym $mod+m mode "default"
}

# ── Insert mode (main → i) ─────────────────────────────────────
mode "insert" {
    bindsym w exec rofi -show window; mode "default"

    bindsym Escape mode "default"
    bindsym $mod+m mode "default"
}

