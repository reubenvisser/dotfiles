# Vim-grammar modal system
# Enter main mode with $mod+m, then use mnemonic key sequences

# ── Main mode ($mod+m) ─────────────────────────────────────────
mode "main" {
    bindsym p mode "power"
    bindsym i mode "insert"
    bindsym s mode "session"

    bindsym Escape mode "default"
    bindsym $mod+m mode "default"
}
bindsym $mod+m mode "main"

# ── Power mode (main → p) ──────────────────────────────────────
mode "power" {
    bindsym s exec --no-startup-id systemctl suspend; mode "default"
    bindsym p exec --no-startup-id systemctl poweroff; mode "default"
    bindsym r exec --no-startup-id systemctl reboot; mode "default"
    bindsym l exec --no-startup-id ~/.config/i3/lock.sh; mode "default"

    bindsym Escape mode "default"
    bindsym $mod+m mode "default"
}

# ── Insert mode (main → i) ─────────────────────────────────────
mode "insert" {
    bindsym e exec --no-startup-id rofi -modi emoji -show emoji; mode "default"
    bindsym w exec --no-startup-id rofi -show window; mode "default"

    bindsym Escape mode "default"
    bindsym $mod+m mode "default"
}

# ── Pass-through mode for remote (x2go) ────────────────────────
mode "passthrough" {
    bindsym $mod+Escape mode "default"
}
bindsym $mod+Shift+p mode "passthrough"
